[package]
name        = "lex-log"
version     = "0.1.0"
description = "OpenTelemetry-compatible structured logging, tracing, and metrics for Lex."
license     = "EUPL-1.2"
lex         = "0.9.5"

[dependencies]
# The exporter serialises through lex-schema's Json ADT. A git dep so
# `lex pkg install` resolves it in CI; for local hacking on both repos
# side by side, swap in `{ path = "../lex-schema" }`.
lex-schema = { git = "https://github.com/alpibrusl/lex-schema" }
